name: CI — Lint, Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Backend: Lint + Test
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Node/Express)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          PORT: 5000
          MONGO_URI: mongodb://localhost:27017/gitnest_test
          JWT_SECRET: test_secret_for_ci
          NODE_ENV: test

  # ─────────────────────────────────────────────
  # Frontend: Lint + Test + Build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test -- --watchAll=false
        env:
          REACT_APP_API_URL: http://localhost:5000/api
          CI: true

      - name: Build for production
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:5000/api
          CI: true
